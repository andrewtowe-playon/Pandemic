<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandemic — Interactive Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060614;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Consolas, monospace;
      color: #cce;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 16px;
      width: 100%;
      background: rgba(0,0,30,0.95);
      border-bottom: 1px solid #224;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.2rem;
      letter-spacing: 4px;
      color: #6af;
      text-shadow: 0 0 12px #4af;
      flex-shrink: 0;
    }

    /* Player badges */
    #player-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .player-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid #334;
      background: rgba(0,0,20,0.6);
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .player-badge.active {
      border-color: var(--player-color);
      background: rgba(0,0,40,0.9);
      box-shadow: 0 0 8px var(--player-color), inset 0 0 6px rgba(255,255,255,0.04);
    }
    .player-badge .badge-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--player-color);
      flex-shrink: 0;
    }
    .player-badge.active .badge-dot {
      box-shadow: 0 0 6px var(--player-color);
    }
    .player-badge .badge-name {
      color: #99a;
      font-weight: bold;
    }
    .player-badge.active .badge-name { color: #dde; }
    .player-badge .badge-city {
      color: #556;
      font-size: 0.7rem;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-badge.active .badge-city { color: #aab; }

    /* Turn info */
    #turn-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
    }
    #turn-label {
      font-weight: bold;
      color: #dde;
    }
    #moves-pips {
      display: flex;
      gap: 3px;
    }
    .pip {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: #334;
      transition: background 0.2s;
    }
    .pip.filled {
      background: var(--active-color, gold);
      box-shadow: 0 0 4px var(--active-color, gold);
    }

    button {
      padding: 4px 11px;
      border-radius: 5px;
      border: 1px solid #446;
      background: #223;
      color: #aac;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      flex-shrink: 0;
    }
    button:hover { background: #334; }

    #end-turn-btn {
      border-color: #464;
      color: #8b8;
    }
    #end-turn-btn:hover { background: #142; }

    #cal-btn.active { background: #442200; border-color: orange; color: orange; }
    #export-btn { display: none; background: #143; border-color: #4a4; color: #8f8; }
    #export-btn:hover { background: #164; }
    #cal-info { display: none; font-size: 0.72rem; color: #a80; font-style: italic; }

    #transpacific-note {
      margin-left: auto;
      font-size: 0.7rem;
      color: #446;
      font-style: italic;
    }

    /* Board */
    #board-container {
      position: relative;
      width: 98vw;
      max-width: 1400px;
      margin: 6px 0;
    }

    #board-img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    #svg-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .conn-normal { stroke: rgba(255,255,255,0.15); stroke-width: 0.8; fill: none; }
    .conn-active { stroke-width: 1.6; fill: none; }

    #cities-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .city-node {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: all;
      z-index: 5;
    }
    .city-node .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .city-node .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 2px);
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 7.5px;
      color: rgba(255,255,255,0.75);
      text-shadow: 0 0 4px #000, 0 0 2px #000;
      pointer-events: none;
      line-height: 1;
    }

    .city-node.current .dot {
      border-color: var(--active-color, gold);
      box-shadow: 0 0 10px var(--active-color, gold);
      transform: scale(1.3);
    }
    .city-node.valid-move { cursor: pointer; }
    .city-node.valid-move .dot {
      border-color: rgba(255,255,255,0.9);
      animation: pulse 0.85s ease-in-out infinite alternate;
    }
    .city-node.valid-move:hover .dot {
      transform: scale(1.55);
      box-shadow: 0 0 14px #fff;
    }
    .city-node.invalid { cursor: not-allowed; }

    @keyframes pulse {
      from { box-shadow: 0 0 3px rgba(255,255,255,0.3); }
      to   { box-shadow: 0 0 12px rgba(255,255,255,0.9); transform: scale(1.25); }
    }

    /* Calibration */
    body.calibrating .city-node { cursor: grab; }
    body.calibrating .city-node:active { cursor: grabbing; }
    body.calibrating .city-node .dot {
      animation: none !important;
      border-color: orange !important;
      box-shadow: 0 0 5px orange !important;
      transform: none !important;
    }
    body.calibrating .city-node.dragging .dot {
      box-shadow: 0 0 14px #fff, 0 0 6px orange !important;
      transform: scale(1.4) !important;
    }

    #coords-display {
      display: none;
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(0,0,0,0.8);
      color: #fa0;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 50;
      font-family: monospace;
    }

    /* Player tokens */
    .player-token {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 6px rgba(0,0,0,0.7);
      transform: translate(-50%, -50%);
      transition: left 0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
                  top  0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: bold;
      color: rgba(0,0,0,0.7);
    }
    .player-token.active-token {
      z-index: 25;
      width: 24px;
      height: 24px;
      border-color: #fff;
      box-shadow: 0 0 12px var(--token-color), 0 0 5px var(--token-color), 0 2px 8px rgba(0,0,0,0.8);
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      padding: 7px 20px;
      border-radius: 20px;
      font-size: 0.82rem;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 100;
      background: rgba(200,40,40,0.92);
    }
    #toast.show { opacity: 1; }
    #toast.green { background: rgba(30,150,30,0.92); }
    #toast.info  { background: rgba(20,80,180,0.92); }
  </style>
</head>
<body>

  <header>
    <h1>PANDEMIC</h1>
    <div id="player-badges"></div>
    <div id="turn-info">
      <span id="turn-label">—</span>
      <div id="moves-pips"></div>
    </div>
    <button id="end-turn-btn" onclick="endTurn()">End Turn</button>
    <button id="cal-btn" onclick="toggleCalibration()">Calibrate</button>
    <button id="export-btn" onclick="exportCoords()">Copy Coordinates</button>
    <span id="cal-info">Drag dots to correct positions, then click Copy Coordinates</span>
    <div id="transpacific-note">Trans-Pacific: SF ↔ Tokyo, SF ↔ Manila, LA ↔ Sydney</div>
  </header>

  <div id="board-container">
    <img id="board-img" src="Board.webp" alt="Pandemic Board" draggable="false">
    <svg id="svg-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div id="cities-layer"></div>
    <div id="coords-display">x: 0.00%  y: 0.00%</div>
    <div id="tokens-layer"></div>
  </div>

  <div id="toast"></div>

  <script>
    // ── Players ──────────────────────────────────────────────────────────────
    const PLAYERS = [
      { name: "Player 1", city: "Atlanta", color: "#e05555" },
      { name: "Player 2", city: "Atlanta", color: "#4dc4ff" },
      { name: "Player 3", city: "Atlanta", color: "#55cc77" },
      { name: "Player 4", city: "Atlanta", color: "#ffb833" },
    ];
    const MOVES_PER_TURN = 4;
    let currentPlayerIndex = 0;
    let movesLeft = MOVES_PER_TURN;

    // Token offsets so stacked tokens are visible (px)
    const TOKEN_OFFSETS = [
      { dx: -7, dy: -7 },
      { dx:  7, dy: -7 },
      { dx: -7, dy:  7 },
      { dx:  7, dy:  7 },
    ];

    // ── City definitions ─────────────────────────────────────────────────────
    const CITIES = {
      "San Francisco":    { x:  8.2, y: 34.7, color: "#3399ff" },
      "Chicago":          { x: 17.1, y: 31.4, color: "#3399ff" },
      "Atlanta":          { x: 19.9, y: 38.3, color: "#3399ff" },
      "Montreal":         { x: 24.2, y: 30.9, color: "#3399ff" },
      "Washington":       { x: 27.0, y: 37.7, color: "#3399ff" },
      "New York":         { x: 29.3, y: 31.8, color: "#3399ff" },
      "London":           { x: 42.4, y: 26.2, color: "#3399ff" },
      "Essen":            { x: 49.0, y: 24.3, color: "#3399ff" },
      "St. Petersburg":   { x: 56.5, y: 22.3, color: "#3399ff" },
      "Madrid":           { x: 41.6, y: 35.6, color: "#3399ff" },
      "Paris":            { x: 47.4, y: 31.6, color: "#3399ff" },
      "Milan":            { x: 51.5, y: 29.2, color: "#3399ff" },

      "Los Angeles":      { x:  9.6, y: 44.8, color: "#ffcc00" },
      "Mexico City":      { x: 16.1, y: 47.9, color: "#ffcc00" },
      "Miami":            { x: 24.2, y: 46.5, color: "#ffcc00" },
      "Bogota":           { x: 23.6, y: 56.8, color: "#ffcc00" },
      "Lima":             { x: 21.4, y: 66.7, color: "#ffcc00" },
      "Santiago":         { x: 22.0, y: 77.5, color: "#ffcc00" },
      "Buenos Aires":     { x: 29.4, y: 75.7, color: "#ffcc00" },
      "Sao Paulo":        { x: 33.7, y: 68.3, color: "#ffcc00" },
      "Lagos":            { x: 47.1, y: 54.4, color: "#ffcc00" },
      "Kinshasa":         { x: 50.8, y: 61.0, color: "#ffcc00" },
      "Khartoum":         { x: 55.1, y: 52.7, color: "#ffcc00" },
      "Johannesburg":     { x: 55.3, y: 71.9, color: "#ffcc00" },

      "Algiers":          { x: 49.2, y: 41.1, color: "#bbbbbb" },
      "Cairo":            { x: 54.0, y: 43.1, color: "#bbbbbb" },
      "Istanbul":         { x: 55.2, y: 34.7, color: "#bbbbbb" },
      "Moscow":           { x: 60.3, y: 29.0, color: "#bbbbbb" },
      "Baghdad":          { x: 59.9, y: 39.5, color: "#bbbbbb" },
      "Tehran":           { x: 64.6, y: 32.8, color: "#bbbbbb" },
      "Riyadh":           { x: 60.9, y: 49.1, color: "#bbbbbb" },
      "Karachi":          { x: 66.1, y: 42.5, color: "#bbbbbb" },
      "Delhi":            { x: 71.7, y: 40.4, color: "#bbbbbb" },
      "Mumbai":           { x: 67.6, y: 50.5, color: "#bbbbbb" },
      "Chennai":          { x: 73.0, y: 55.3, color: "#bbbbbb" },
      "Kolkata":          { x: 76.1, y: 42.4, color: "#bbbbbb" },

      "Beijing":          { x: 80.3, y: 31.5, color: "#ff5555" },
      "Seoul":            { x: 86.3, y: 30.7, color: "#ff5555" },
      "Tokyo":            { x: 90.9, y: 34.5, color: "#ff5555" },
      "Shanghai":         { x: 80.9, y: 38.4, color: "#ff5555" },
      "Taipei":           { x: 87.0, y: 45.4, color: "#ff5555" },
      "Osaka":            { x: 92.2, y: 42.4, color: "#ff5555" },
      "Hong Kong":        { x: 81.0, y: 46.6, color: "#ff5555" },
      "Bangkok":          { x: 77.6, y: 50.4, color: "#ff5555" },
      "Ho Chi Minh City": { x: 81.6, y: 57.6, color: "#ff5555" },
      "Manila":           { x: 88.6, y: 57.3, color: "#ff5555" },
      "Jakarta":          { x: 77.2, y: 64.1, color: "#ff5555" },
      "Sydney":           { x: 92.4, y: 76.9, color: "#ff5555" },
    };

    const DRAWN_CONNECTIONS = [
      ["San Francisco","Chicago"], ["San Francisco","Los Angeles"],
      ["Chicago","Atlanta"], ["Chicago","Montreal"], ["Chicago","Mexico City"], ["Chicago","Los Angeles"],
      ["Atlanta","Miami"], ["Atlanta","Washington"],
      ["Montreal","Washington"], ["Montreal","New York"],
      ["Washington","New York"], ["Washington","Miami"],
      ["New York","London"], ["New York","Madrid"],
      ["London","Essen"], ["London","Madrid"], ["London","Paris"],
      ["Madrid","Paris"], ["Madrid","Algiers"], ["Madrid","Sao Paulo"],
      ["Paris","Essen"], ["Paris","Milan"], ["Paris","Algiers"],
      ["Essen","Milan"], ["Essen","St. Petersburg"],
      ["Milan","Istanbul"],
      ["St. Petersburg","Istanbul"], ["St. Petersburg","Moscow"],
      ["Los Angeles","Mexico City"],
      ["Mexico City","Miami"], ["Mexico City","Bogota"], ["Mexico City","Lima"],
      ["Miami","Bogota"],
      ["Bogota","Lima"], ["Bogota","Buenos Aires"], ["Bogota","Sao Paulo"],
      ["Lima","Santiago"],
      ["Buenos Aires","Sao Paulo"],
      ["Sao Paulo","Lagos"],
      ["Lagos","Kinshasa"], ["Lagos","Khartoum"],
      ["Kinshasa","Khartoum"], ["Kinshasa","Johannesburg"],
      ["Khartoum","Johannesburg"], ["Khartoum","Cairo"],
      ["Algiers","Cairo"], ["Algiers","Istanbul"],
      ["Cairo","Istanbul"], ["Cairo","Baghdad"], ["Cairo","Riyadh"],
      ["Istanbul","Baghdad"], ["Istanbul","Moscow"],
      ["Moscow","Tehran"],
      ["Baghdad","Tehran"], ["Baghdad","Riyadh"], ["Baghdad","Karachi"],
      ["Riyadh","Karachi"],
      ["Tehran","Karachi"], ["Tehran","Delhi"],
      ["Karachi","Delhi"], ["Karachi","Mumbai"],
      ["Delhi","Mumbai"], ["Delhi","Chennai"], ["Delhi","Kolkata"],
      ["Mumbai","Chennai"],
      ["Chennai","Kolkata"], ["Chennai","Bangkok"], ["Chennai","Jakarta"],
      ["Kolkata","Bangkok"], ["Kolkata","Hong Kong"],
      ["Beijing","Seoul"], ["Beijing","Shanghai"],
      ["Seoul","Shanghai"], ["Seoul","Tokyo"],
      ["Tokyo","Shanghai"], ["Tokyo","Osaka"],
      ["Shanghai","Hong Kong"], ["Shanghai","Taipei"],
      ["Taipei","Hong Kong"], ["Taipei","Osaka"], ["Taipei","Manila"],
      ["Hong Kong","Bangkok"], ["Hong Kong","Ho Chi Minh City"], ["Hong Kong","Manila"],
      ["Bangkok","Ho Chi Minh City"], ["Bangkok","Jakarta"],
      ["Ho Chi Minh City","Jakarta"], ["Ho Chi Minh City","Manila"],
      ["Manila","Sydney"], ["Jakarta","Sydney"],
    ];

    const TRANSPACIFIC = [
      ["San Francisco","Tokyo"],
      ["San Francisco","Manila"],
      ["Los Angeles","Sydney"],
    ];

    // ── Adjacency ────────────────────────────────────────────────────────────
    const adjacency = {};
    Object.keys(CITIES).forEach(c => { adjacency[c] = new Set(); });
    [...DRAWN_CONNECTIONS, ...TRANSPACIFIC].forEach(([a, b]) => {
      adjacency[a].add(b);
      adjacency[b].add(a);
    });

    // ── Calibration state ────────────────────────────────────────────────────
    let calibrating = false;
    let dragState = null;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const svg          = document.getElementById('svg-overlay');
    const citiesLayer  = document.getElementById('cities-layer');
    const tokensLayer  = document.getElementById('tokens-layer');
    const container    = document.getElementById('board-container');
    const coordsEl     = document.getElementById('coords-display');

    // ── Helpers ───────────────────────────────────────────────────────────────
    const activePlayer = () => PLAYERS[currentPlayerIndex];

    // ── SVG connections ──────────────────────────────────────────────────────
    function renderConnections() {
      svg.innerHTML = '';
      DRAWN_CONNECTIONS.forEach(([a, b]) => {
        const ca = CITIES[a], cb = CITIES[b];
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', ca.x); line.setAttribute('y1', ca.y);
        line.setAttribute('x2', cb.x); line.setAttribute('y2', cb.y);
        line.setAttribute('class', 'conn-normal');
        line.dataset.a = a;
        line.dataset.b = b;
        svg.appendChild(line);
      });
    }

    function highlightConnections() {
      const city = activePlayer().city;
      svg.querySelectorAll('line').forEach(line => {
        const { a, b } = line.dataset;
        const isEdge = (a === city || b === city);
        if (isEdge && !calibrating) {
          line.setAttribute('class', 'conn-active');
          line.setAttribute('stroke', activePlayer().color);
          line.setAttribute('stroke-opacity', '0.6');
        } else {
          line.setAttribute('class', 'conn-normal');
          line.removeAttribute('stroke');
          line.removeAttribute('stroke-opacity');
        }
      });
    }

    // ── City nodes ───────────────────────────────────────────────────────────
    function renderCities() {
      citiesLayer.innerHTML = '';
      Object.entries(CITIES).forEach(([name, data]) => {
        const node = document.createElement('div');
        node.className = 'city-node';
        node.dataset.city = name;
        node.style.left = data.x + '%';
        node.style.top  = data.y + '%';

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = data.color;

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = name;

        node.appendChild(dot);
        node.appendChild(label);
        node.addEventListener('mousedown', e => { if (calibrating) startDrag(e, name, node); });
        node.addEventListener('click', () => { if (!calibrating) onCityClick(name); });
        citiesLayer.appendChild(node);
      });
    }

    function updateCityStates() {
      if (calibrating) {
        document.querySelectorAll('.city-node').forEach(n => {
          n.classList.remove('current', 'valid-move', 'invalid');
        });
        return;
      }
      const city = activePlayer().city;
      const color = activePlayer().color;
      document.documentElement.style.setProperty('--active-color', color);
      document.querySelectorAll('.city-node').forEach(node => {
        const name = node.dataset.city;
        node.classList.remove('current', 'valid-move', 'invalid');
        if (name === city)                    node.classList.add('current');
        else if (adjacency[city].has(name))   node.classList.add('valid-move');
        else                                  node.classList.add('invalid');
      });
    }

    // ── Tokens ───────────────────────────────────────────────────────────────
    const tokenEls = [];

    function buildTokens() {
      tokensLayer.innerHTML = '';
      tokenEls.length = 0;
      PLAYERS.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'player-token';
        el.style.setProperty('--token-color', p.color);
        el.style.background = p.color;
        el.dataset.playerIndex = i;
        tokensLayer.appendChild(el);
        tokenEls.push(el);
      });
    }

    function placeAllTokens(animate = true) {
      PLAYERS.forEach((p, i) => {
        const el = tokenEls[i];
        const city = CITIES[p.city];
        const off = TOKEN_OFFSETS[i];
        if (!animate) el.style.transition = 'none';
        el.style.left = city.x + '%';
        el.style.top  = city.y + '%';
        el.style.transform = `translate(calc(-50% + ${off.dx}px), calc(-50% + ${off.dy}px))`;
        el.classList.toggle('active-token', i === currentPlayerIndex);
        if (!animate) requestAnimationFrame(() => { el.style.transition = ''; });
      });
    }

    // ── Header UI ────────────────────────────────────────────────────────────
    function buildPlayerBadges() {
      const container = document.getElementById('player-badges');
      container.innerHTML = '';
      PLAYERS.forEach((p, i) => {
        const badge = document.createElement('div');
        badge.className = 'player-badge' + (i === currentPlayerIndex ? ' active' : '');
        badge.style.setProperty('--player-color', p.color);
        badge.dataset.playerIndex = i;
        badge.innerHTML = `
          <div class="badge-dot"></div>
          <span class="badge-name">${p.name}</span>
          <span class="badge-city">${p.city}</span>
        `;
        container.appendChild(badge);
      });
    }

    function updateHeader() {
      const p = activePlayer();
      document.getElementById('turn-label').textContent = `${p.name}'s Turn`;
      document.getElementById('turn-label').style.color = p.color;
      document.documentElement.style.setProperty('--active-color', p.color);

      // Pips
      const pipsEl = document.getElementById('moves-pips');
      pipsEl.innerHTML = '';
      for (let i = 0; i < MOVES_PER_TURN; i++) {
        const pip = document.createElement('div');
        pip.className = 'pip' + (i < movesLeft ? ' filled' : '');
        pipsEl.appendChild(pip);
      }

      // Badges
      document.querySelectorAll('.player-badge').forEach((badge, i) => {
        badge.classList.toggle('active', i === currentPlayerIndex);
        badge.querySelector('.badge-city').textContent = PLAYERS[i].city;
      });
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer = null;
    const toastEl = document.getElementById('toast');

    function showToast(msg, type = '') {
      toastEl.textContent = msg;
      toastEl.className = 'show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.className = ''; }, 2200);
    }

    // ── Game logic ────────────────────────────────────────────────────────────
    function onCityClick(name) {
      if (calibrating) return;
      const p = activePlayer();
      if (name === p.city) return;
      if (!adjacency[p.city].has(name)) {
        showToast(`${name} is not connected to ${p.city}`);
        return;
      }

      p.city = name;
      movesLeft--;

      placeAllTokens();
      updateCityStates();
      highlightConnections();
      updateHeader();

      if (movesLeft === 0) {
        setTimeout(advanceTurn, 400);
      }
    }

    function endTurn() {
      if (calibrating) return;
      advanceTurn();
    }

    function advanceTurn() {
      currentPlayerIndex = (currentPlayerIndex + 1) % PLAYERS.length;
      movesLeft = MOVES_PER_TURN;
      placeAllTokens();
      updateCityStates();
      highlightConnections();
      updateHeader();
      showToast(`${activePlayer().name}'s turn`, 'info');
    }

    // ── Calibration ──────────────────────────────────────────────────────────
    function toggleCalibration() {
      calibrating = !calibrating;
      document.body.classList.toggle('calibrating', calibrating);
      const btn = document.getElementById('cal-btn');
      btn.textContent = calibrating ? 'Exit Calibrate' : 'Calibrate';
      btn.classList.toggle('active', calibrating);
      document.getElementById('export-btn').style.display = calibrating ? 'inline-block' : 'none';
      document.getElementById('cal-info').style.display   = calibrating ? 'inline' : 'none';
      coordsEl.style.display = calibrating ? 'block' : 'none';
      tokensLayer.style.display = calibrating ? 'none' : 'block';
      updateCityStates();
      highlightConnections();
    }

    container.addEventListener('mousemove', e => {
      if (!calibrating) return;
      const rect = container.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width  * 100).toFixed(2);
      const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(2);
      coordsEl.textContent = `x: ${x}%  y: ${y}%`;
      if (dragState) {
        CITIES[dragState.name].x = parseFloat(x);
        CITIES[dragState.name].y = parseFloat(y);
        dragState.node.style.left = x + '%';
        dragState.node.style.top  = y + '%';
        renderConnections();
      }
    });

    function startDrag(e, name, node) {
      e.preventDefault();
      dragState = { name, node };
      node.classList.add('dragging');
    }

    document.addEventListener('mouseup', () => {
      if (dragState) { dragState.node.classList.remove('dragging'); dragState = null; }
    });

    function exportCoords() {
      const lines = Object.entries(CITIES).map(([name, d]) =>
        `  "${name}": { x: ${d.x.toFixed(1)}, y: ${d.y.toFixed(1)}, color: "${d.color}" },`
      );
      navigator.clipboard.writeText('const CITIES = {\n' + lines.join('\n') + '\n};')
        .then(() => showToast('Coordinates copied!', 'green'));
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    renderConnections();
    renderCities();
    buildTokens();
    buildPlayerBadges();
    placeAllTokens(false);
    updateCityStates();
    highlightConnections();
    updateHeader();
  </script>
</body>
</html>
