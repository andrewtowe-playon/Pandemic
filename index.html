<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pandemic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060614;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Segoe UI', Consolas, monospace;
      color: #cce;
    }

    header {
      display: flex; align-items: center; gap: 20px;
      padding: 8px 20px; width: 100%;
      background: rgba(0,0,30,0.8);
      border-bottom: 1px solid #224;
    }
    header h1 {
      font-size: 1.3rem; letter-spacing: 4px;
      color: #6af; text-shadow: 0 0 12px #4af;
    }
    #status-bar { display: flex; gap: 20px; font-size: 0.82rem; flex-wrap: wrap; }
    #status-bar span { color: #aab; }
    #status-bar strong { color: gold; font-weight: normal; }

    /* ── layout: board + sidebar ─────────────────────────────────────── */
    #layout { display: flex; width: 100%; flex: 1; }

    #board-container {
      position: relative; flex: 1; min-width: 0;
      align-self: flex-start; margin: 6px;
    }
    #board-img {
      display: block; width: 100%; height: auto;
      user-select: none; -webkit-user-drag: none;
      /* fallback background if Board.webp is missing */
      background: linear-gradient(160deg, #0a1030, #05213a 60%, #06132a);
      min-height: 60vh;
    }
    #svg-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: visible;
    }
    .conn-normal { stroke: rgba(255,255,255,0.18); stroke-width: 0.8; fill: none; }
    .conn-active { stroke: rgba(255,220,50,0.55); stroke-width: 1.5; fill: none; }

    #cities-layer, #pawn-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    #pawn-layer { z-index: 15; }

    .city-node {
      position: absolute; transform: translate(-50%, -50%);
      cursor: default; pointer-events: all; z-index: 5;
    }
    .city-node .dot {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .city-node .label {
      position: absolute; left: 50%; top: calc(100% + 2px);
      transform: translateX(-50%); white-space: nowrap;
      font-size: 7.5px; color: rgba(255,255,255,0.8);
      text-shadow: 0 0 4px #000, 0 0 2px #000; pointer-events: none; line-height: 1;
    }
    .city-node.current .dot {
      border-color: gold; box-shadow: 0 0 10px gold, 0 0 4px #ffa; transform: scale(1.2);
    }
    .city-node.valid-move { cursor: pointer; }
    .city-node.valid-move .dot { border-color: #fff; }
    .city-node.valid-move:hover .dot { transform: scale(1.5); box-shadow: 0 0 14px #fff; }

    /* Flight targets: pulsing glow so they stand out from plain drive targets */
    .city-node.flight-target { cursor: pointer; }
    .city-node.flight-target .dot {
      border-color: #fff;
      animation: flight-pulse 0.75s ease-in-out infinite alternate;
    }
    .city-node.flight-target:hover .dot {
      transform: scale(1.6);
      box-shadow: 0 0 18px #fff, 0 0 8px gold;
      animation: none;
    }
    @keyframes flight-pulse {
      from { box-shadow: 0 0 4px rgba(255,255,255,0.4); transform: scale(1); }
      to   { box-shadow: 0 0 14px #fff, 0 0 6px gold; transform: scale(1.3); }
    }

    /* disease cubes clustered above the dot */
    .cube-holder {
      position: absolute; left: 50%; bottom: calc(100% + 2px);
      transform: translateX(-50%);
      display: flex; flex-wrap: wrap; gap: 2px; width: 32px; justify-content: center;
    }
    .cube {
      width: 9px; height: 9px; border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.95);
      box-shadow: 0 0 3px 1px rgba(0,0,0,0.85);
    }

    /* ── sidebar ─────────────────────────────────────────────────────── */
    #sidebar {
      width: 300px; flex-shrink: 0; padding: 10px 14px;
      background: rgba(0,0,20,0.6); border-left: 1px solid #224;
      font-size: 0.82rem; overflow-y: auto; max-height: calc(100vh - 50px);
    }
    #sidebar h2 { font-size: 0.9rem; color: #6af; margin: 10px 0 6px; letter-spacing: 2px; }
    /* Action pills: fixed-size grid, 3 across, icon over label. */
    #action-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 4px;
    }
    #action-buttons button {
      height: 44px;            /* fixed height (~40% shorter than before) */
      width: 100%;             /* fixed width via the 3-col grid track */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 3px 4px;
      cursor: pointer;
      background: #16224a; color: #cce;
      border: 1px solid #335; border-radius: 7px;
      font-size: 0.66rem; line-height: 1.1; text-align: center;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
    }
    #action-buttons button:hover { background: #1d2c5c; border-color: #4a6; transform: translateY(-1px); }
    #action-buttons button .pill-icon { color: #7ab8ff; line-height: 0; }
    #action-buttons button .pill-icon svg { width: 17px; height: 17px; display: block; }
    #action-buttons button .pill-label { display: block; }
    #action-buttons button.active {
      background: #2a56b0; border-color: #6af; box-shadow: 0 0 8px rgba(106,170,255,0.5);
    }
    #action-buttons button.active .pill-icon { color: #cfe6ff; }
    /* The contextual sub-choice row spans the full grid width. */
    /* Contextual sub-choice picker (Treat color, Cure, Share, Forecast order, …).
       Spans the grid; its buttons are compact chips (NOT the fixed-size pills),
       laid out with wrapping + spacing. */
    #action-buttons #action-choice {
      grid-column: 1 / -1;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      padding: 4px 0;
    }
    #action-buttons #action-choice button {
      width: auto; height: auto; flex: none; flex-direction: row;
      padding: 5px 10px; font-size: 0.72rem; border-radius: 5px;
    }
    #turn-buttons { margin: 10px 0; }
    #turn-buttons button {
      width: 100%; padding: 10px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
      letter-spacing: 1px;
      background: #16224a; color: #cce; border: 1px solid #335; border-radius: 6px;
    }
    #turn-buttons button:hover { background: #1d2c5c; border-color: #6af; }
    #turn-buttons button:disabled { opacity: 0.5; cursor: default; }
    #log { font-size: 0.72rem; color: #99b; max-height: 160px; overflow-y: auto; }

    /* ── dev console ─────────────────────────────────────────────────── */
    #dev-section { margin-top: 14px; border-top: 1px solid #2a3a2a; padding-top: 6px; }
    #dev-section h2 { color: #4a4; cursor: pointer; user-select: none; }
    #dev-section h2:hover { color: #6c6; }
    #dev-body { margin-top: 6px; }
    #dev-tabs { display: flex; gap: 3px; margin-bottom: 6px; }
    #dev-tabs button {
      flex: 1; padding: 3px 0; font-size: 0.7rem; cursor: pointer;
      background: #111a11; color: #6a6; border: 1px solid #2a3a2a; border-radius: 3px;
    }
    #dev-tabs button.dev-tab-active { background: #1a2f1a; color: #8f8; border-color: #4a4; }
    .dev-json { font-size: 0.65rem; line-height: 1.4; white-space: pre-wrap; word-break: break-all;
      background: #070f07; padding: 6px; border-radius: 4px; max-height: 320px; overflow-y: auto; }
    .dev-jk   { color: #8cf; } /* key */
    .dev-js   { color: #fa8; } /* string value */
    .dev-jn   { color: #adf; } /* number */
    .dev-jb   { color: #f88; } /* bool */
    .dev-jnull{ color: #888; }
    .dev-deck-title  { font-size: 0.72rem; color: #8f8; margin: 8px 0 3px; font-weight: bold; }
    .dev-count { color: #666; font-weight: normal; }
    .dev-card-list   { max-height: 180px; overflow-y: auto; font-size: 0.65rem; }
    .dev-card        { padding: 1px 4px; border-left: 2px solid #444; margin: 1px 0; color: #aab; }
    .dev-pos         { color: #556; font-style: italic; }
    .dev-empty       { color: #445; font-size: 0.68rem; font-style: italic; margin-bottom: 4px; }
    .dev-epidemic    { color: #f80; font-weight: bold; }
    .dev-event       { color: #af8; }
    .dev-c-blue      { border-color: #3399ff; }
    .dev-c-yellow    { border-color: #ffcc00; }
    .dev-c-black     { border-color: #aaa; }
    .dev-c-red       { border-color: #ff5555; }
    .dev-c-epidemic  { border-color: #f80; }
    .dev-c-event     { border-color: #af8; }
    .dev-deck-section{ margin-bottom: 8px; }
    .dev-section-label { font-size: 0.65rem; color: #4a4; letter-spacing: 2px;
      margin: 10px 0 4px; border-bottom: 1px solid #1a2f1a; }
    .dev-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 4px; }
    .dev-row label { font-size: 0.7rem; color: #8a8; }
    .dev-row select, .dev-row input {
      font-size: 0.68rem; background: #0a100a; color: #ccd;
      border: 1px solid #2a3a2a; border-radius: 3px; padding: 2px 4px; flex: 1; min-width: 0;
    }
    .dev-row button {
      font-size: 0.68rem; padding: 3px 7px; background: #0e1f0e; color: #8f8;
      border: 1px solid #2a3a2a; border-radius: 3px; cursor: pointer; white-space: nowrap;
    }
    .dev-row button:hover { background: #162616; }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(200,40,40,0.9); color: white; padding: 6px 18px;
      border-radius: 20px; font-size: 0.8rem; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; }

    /* setup / end-game modal */
    #modal {
      position: fixed; inset: 0; background: rgba(0,0,10,0.85);
      display: none; align-items: center; justify-content: center; z-index: 200;
    }
    #modal.show { display: flex; }
    #modal-box {
      background: #0c1230; border: 1px solid #335; border-radius: 8px;
      padding: 24px 30px; max-width: 420px; text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>PANDEMIC</h1>
    <div id="status-bar">
      <span>Turn: <strong id="s-player">—</strong></span>
      <span>Actions: <strong id="s-actions">—</strong></span>
      <span>Infection rate: <strong id="s-rate">—</strong></span>
      <span>Outbreaks: <strong id="s-outbreaks">—</strong></span>
    </div>
    <a id="new-game-btn" href="setup.html" style="margin-left:auto;color:#6af;font-size:0.8rem;text-decoration:none;border:1px solid #335;border-radius:4px;padding:4px 10px;">＋ New Game</a>
  </header>

  <div id="layout">
    <!-- BOARD (owner: Abigail / render.js) -->
    <div id="board-container">
      <img id="board-img" src="Board.webp" alt="Pandemic Board" draggable="false">
      <svg id="svg-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div id="cities-layer"></div>
      <div id="pawn-layer"></div>
    </div>

    <!-- SIDEBAR (owner: Mike / controls.js) -->
    <aside id="sidebar">
      <h2>CURRENT PLAYER</h2>
      <div id="player-info">—</div>

      <h2>ACTIONS</h2>
      <div id="action-buttons"><!-- Controls.init() populates --></div>

      <h2>HAND</h2>
      <div id="hand"></div>

      <div id="turn-buttons"><!-- End Turn (full-width, no header) --></div>

      <h2>DISEASES</h2>
      <div id="cure-status"></div>

      <!-- ALL PLAYERS OVERVIEW -->
      <h2>ALL PLAYERS</h2>
      <div id="all-players-panel"></div>

      <h2>LOG</h2>
      <div id="log"></div>

      <!-- DEV CONSOLE -->
      <div id="dev-section">
        <h2 onclick="DevConsole.toggle()">⚙ DEV <span id="dev-chevron">▸</span></h2>
        <div id="dev-body" style="display:none">
          <div id="dev-tabs">
            <button id="dev-btn-state" class="dev-tab-active" onclick="DevConsole.showTab('state')">State</button>
            <button id="dev-btn-decks" onclick="DevConsole.showTab('decks')">Decks</button>
            <button id="dev-btn-edit"  onclick="DevConsole.showTab('edit')">Edit</button>
          </div>
          <div id="dev-tab-state"></div>
          <div id="dev-tab-decks" style="display:none"></div>
          <div id="dev-tab-edit"  style="display:none"></div>
        </div>
      </div>
    </aside>
  </div>

  <div id="toast">—</div>

  <div id="modal"><div id="modal-box"><!-- setup + end-game --></div></div>

  <!-- Load order matters: state first, then leaf modules, then game orchestrator. -->
  <script src="js/state.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/render.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/game.js"></script>
  <script src="js/playerPanel.js"></script>
  <script src="js/devConsole.js"></script>
</body>
</html>
